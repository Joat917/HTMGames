<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 · 点击寻路版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .container {
            background: #16162e;
            padding: 28px 35px 35px 35px;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-title {
            font-size: 24px;
            font-weight: 700;
            color: #d0d0f0;
            letter-spacing: 2px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .game-title .highlight {
            background: linear-gradient(135deg, #6a8aff, #a78aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .game-title .sub {
            font-size: 13px;
            font-weight: 400;
            color: #6a6a8a;
            -webkit-text-fill-color: #6a6a8a;
            background: none;
        }


        canvas {
            display: block;
            border-radius: 16px;
            background: #1a1a2e;
            box-shadow: inset 0 0 0 1px #2e2e52, 0 8px 24px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            width: 600px;
            height: 600px;
        }
        .panel {
            width: 100%;
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px 20px;
            color: #c8c8e8;
            font-size: 15px;
            font-weight: 450;
        }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            background: #1f1f3a;
            padding: 6px 18px 6px 18px;
            border-radius: 40px;
            width: 420px;
            height: 40px;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            background: #2a2a4e;
            color: #aab;
            letter-spacing: 0.3px;
            width: 90px;
        }
        .status-badge.idle {
            background: #2a2a4e;
            color: #99aacc;
        }
        .status-badge.planned {
            background: #1a3a6a;
            color: #7abfff;
        }
        .status-badge.executing {
            background: #3a6a1a;
            color: #8fdd7a;
        }
        .status-badge.gameover {
            background: #6a1a1a;
            color: #ff8a7a;
        }
        .info-group {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            font-size: 14px;
        }
        .info-group span {
            background: #1a1a32;
            padding: 3px 14px;
            border-radius: 30px;
            white-space: nowrap;
            width: 70px;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .controls label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        input[type="range"] {
            width: 100px;
            accent-color: #6a8aff;
            background: #2a2a4e;
            height: 4px;
            border-radius: 4px;
        }
        .btn {
            background: #2a2a52;
            border: none;
            color: #d0d0f0;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
            letter-spacing: 0.3px;
        }
        .btn:hover {
            background: #3d3d6a;
        }
        .btn-restart {
            background: #4a2a4a;
            color: #f0c8d0;
        }
        .btn-restart:hover {
            background: #6a3a4a;
        }
        .hint {
            font-size: 13px;
            color: #6a6a8a;
            margin-left: 4px;
        }
        @media (max-width: 720px) {
            .container {
                padding: 14px;
            }
            canvas {
                width: 100%;
                height: auto;
                aspect-ratio: 1/1;
            }
            .panel {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .status-bar {
                justify-content: center;
            }
            .controls {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-title">
            <span class="highlight">🐍 贪吃蛇</span>
            <span class="sub">· 点击寻路版</span>
        </div>

        <canvas id="gameCanvas" width="600" height="600"></canvas>

        <div class="panel">
            <div class="status-bar">
                <span class="status-badge idle" id="statusBadge">⏸ 空闲</span>
                <div class="info-group">
                    <span id="infoSnake">🐍 3</span>
                    <span id="infoPath">🛤 0</span>
                    <span id="infoTarget">🎯 -</span>
                </div>
            </div>
            <div class="controls">
                <label>
                    速度
                    <input type="range" id="speedSlider" min="0.1" max="3" value="1.3" step="0.1">
                    <span id="speedLabel">20ms</span>
                </label>
                <button class="btn btn-restart" id="restartBtn">⟳ 新游戏</button>
            </div>
        </div>
        <div style="margin-top: 8px; font-size: 13px; color: #4a4a6a; text-align: center; width: 100%;">
            <span class="hint">点击格子规划路径 · 再次点击<strong>同一格</strong>执行 · 执行中点一下跳过</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusBadge = document.getElementById('statusBadge');
        const infoSnake = document.getElementById('infoSnake');
        const infoPath = document.getElementById('infoPath');
        const infoTarget = document.getElementById('infoTarget');
        const speedSlider = document.getElementById('speedSlider');
        const speedLabel = document.getElementById('speedLabel');
        const restartBtn = document.getElementById('restartBtn');

        // ---------- 常量 ----------
        const GRID = 20;
        const CELL = 30;
        const HALF = CELL / 2;

        // 方向常量
        const DIR = {
            UP: 0,
            RIGHT: 1,
            DOWN: 2,
            LEFT: 3
        };
        const DX = [0, 1, 0, -1];
        const DY = [-1, 0, 1, 0];

        // ---------- 游戏状态 ----------
        let snake = [];
        let food = { x: 8, y: 12 };
        let state = 'IDLE'; // IDLE | PLANNED | EXECUTING | GAME_OVER
        let target = null; // {x, y} 或 null
        let currentPath = [];
        let isReachable = false;
        let stepTimer = null;
        let isExecuting = false;
        let stepInterval = 35;
        let skipRequested = false;

        // 存储上次点击的目标，用于判断是否同一格
        let lastClickedTarget = null;

        // ---------- 初始化 ----------
        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 },
                { x: 7, y: 10 },
            ];
            generateFood();
            state = 'IDLE';
            target = null;
            currentPath = [];
            isReachable = false;
            skipRequested = false;
            lastClickedTarget = null;
            if (stepTimer) {
                clearInterval(stepTimer);
                stepTimer = null;
            }
            isExecuting = false;
            updateUI();
            draw();
        }

        // ---------- 食物 ----------
        function generateFood() {
            const total = GRID * GRID;
            if (snake.length >= total) {
                food = { x: -1, y: -1 };
                return;
            }
            const snakeSet = new Set(snake.map(p => `${p.x},${p.y}`));
            const free = [];
            for (let i = 0; i < GRID; i++) {
                for (let j = 0; j < GRID; j++) {
                    if (!snakeSet.has(`${i},${j}`)) free.push({ x: i, y: j });
                }
            }
            if (free.length === 0) {
                food = { x: -1, y: -1 };
                return;
            }
            const idx = Math.floor(Math.random() * free.length);
            food = free[idx];
        }

        // ---------- 获取蛇头方向 ----------
        function getHeadDirection() {
            if (snake.length < 2) return DIR.RIGHT;
            const head = snake[0];
            const next = snake[1];
            const dx = head.x - next.x;
            const dy = head.y - next.y;
            if (dx === 1 && dy === 0) return DIR.RIGHT;
            if (dx === -1 && dy === 0) return DIR.LEFT;
            if (dx === 0 && dy === 1) return DIR.DOWN;
            if (dx === 0 && dy === -1) return DIR.UP;
            return DIR.RIGHT;
        }

        // ---------- 距离场 (只考虑墙壁) ----------
        function computeDistMap() {
            const dist = Array.from({ length: GRID }, () => Array(GRID).fill(Infinity));
            const head = snake[0];
            dist[head.x][head.y] = 0;
            const queue = [{ x: head.x, y: head.y }];
            while (queue.length > 0) {
                const cur = queue.shift();
                const d = dist[cur.x][cur.y];
                for (let i = 0; i < 4; i++) {
                    const nx = cur.x + DX[i],
                        ny = cur.y + DY[i];
                    if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) continue;
                    if (dist[nx][ny] > d + 1) {
                        dist[nx][ny] = d + 1;
                        queue.push({ x: nx, y: ny });
                    }
                }
            }
            return dist;
        }

        // ---------- 动态障碍判定 ----------
        function isCellWalkable(x, y, distMap, targetPos, isFoodTarget) {
            if (x < 0 || x >= GRID || y < 0 || y >= GRID) return false;

            if (food.x >= 0 && food.y >= 0) {
                if (x === food.x && y === food.y) {
                    if (!isFoodTarget) return false;
                }
            }

            const idx = snake.findIndex(p => p.x === x && p.y === y);
            if (idx === -1) return true;
            if (idx === 0) return true;
            const d = distMap[x][y];
            if (d === Infinity) return false;
            return d >= snake.length - idx;
        }

        // ---------- BFS 
        function bfsDynamic(start, goal, distMap, isFoodTarget) {
            if (start.x === goal.x && start.y === goal.y) return [];

            const visited = Array.from({ length: GRID }, () => Array(GRID).fill(false));
            const parent = Array.from({ length: GRID }, () => Array(GRID).fill(null));
            // parentDir 记录从父节点到当前节点的方向
            const parentDir = Array.from({ length: GRID }, () => Array(GRID).fill(-1));

            const queue = [{ x: start.x, y: start.y }];
            visited[start.x][start.y] = true;

            let nearestNode = { x: start.x, y: start.y };
            let nearestDist = Infinity;

            // 获取蛇头方向，用于优先级排序
            const headDir = getHeadDirection();

            while (queue.length > 0) {
                const cur = queue.shift();
                if (cur.x === goal.x && cur.y === goal.y) break;
                const curDist = Math.abs(cur.x - goal.x) + Math.abs(cur.y - goal.y);
                if (curDist < nearestDist && !(cur.x === start.x && cur.y === start.y)) {
                    nearestDist = curDist;
                    nearestNode = { x: cur.x, y: cur.y };
                }

                // 获取进入当前节点的方向 (如果是起点，用蛇头方向)
                let entryDir = parentDir[cur.x][cur.y];
                if (entryDir === -1) {
                    entryDir = headDir;
                }

                // 构建优先级顺序: 直行 > 左转 > 右转 > 掉头(但不应该出现)
                // 四个方向的优先级分数: 直行3, 左转2, 右转1, 掉头0(排除)
                const candidates = [];
                for (let d = 0; d < 4; d++) {
                    const nx = cur.x + DX[d],
                        ny = cur.y + DY[d];
                    if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) continue;
                    if (visited[nx][ny]) continue;
                    if (!isCellWalkable(nx, ny, distMap, goal, isFoodTarget)) continue;
                    let score = 0;
                    if (d === entryDir) {
                        score = 3;
                    } else {
                        if (d === (entryDir + 3) % 4) {
                            score = 2;
                        }
                        else if (d === (entryDir + 1) % 4) {
                            score = 1;
                        }
                        else {
                            score = 0;
                        }
                    }
                    candidates.push({ x: nx, y: ny, dir: d, score: score });
                }
                candidates.sort((a, b) => b.score - a.score);

                for (const c of candidates) {
                    if (!visited[c.x][c.y]) {
                        visited[c.x][c.y] = true;
                        parent[c.x][c.y] = { x: cur.x, y: cur.y };
                        parentDir[c.x][c.y] = c.dir;
                        queue.push({ x: c.x, y: c.y });
                    }
                }
            }

            const path = [];
            let cur = { x: goal.x, y: goal.y };
            if (!visited[goal.x][goal.y]){
                // 找到最接近目标的可达点开始回溯
                cur = nearestNode;
            }
            while (cur.x !== start.x || cur.y !== start.y) {
                path.unshift({ x: cur.x, y: cur.y });
                const p = parent[cur.x][cur.y];
                if (!p) break;
                cur = p;
            }
            console.log(path)
            return path;
        }

        // ---------- 规划路径 ----------
        function planPath(targetPos) {
            const head = snake[0];
            const distMap = computeDistMap();
            const isFoodTarget = (food.x === targetPos.x && food.y === targetPos.y);

            let path = bfsDynamic(head, targetPos, distMap, isFoodTarget);;
            let reachable = path[path.length - 1]?.x === targetPos.x && path[path.length - 1]?.y === targetPos.y;
            let nearest = path.length > 0 ? path[path.length - 1] : head;
            if (targetPos.x === head.x && targetPos.y === head.y) {
                reachable = false; // 原地tp不算可达，因为不能移动
                nearest = head;
            }

            return {
                path: path,
                reachable: reachable,
                nearest: nearest,
                target: targetPos,
                isFoodTarget: isFoodTarget
            };
        }

        function startExecution(plan) {
            if (state === 'GAME_OVER') return;
            if (!plan || !plan.reachable || plan.path.length === 0) {
                if (snake[0].x === plan.target.x && snake[0].y === plan.target.y) {
                    state = 'IDLE';
                    lastClickedTarget = null;
                    updateUI();
                    draw();
                    return;
                }
                state = 'IDLE';
                lastClickedTarget = null;
                updateUI();
                draw();
                return;
            }

            state = 'EXECUTING';
            isExecuting = true;
            skipRequested = false;
            window._pendingTarget = null;
            updateUI();
            draw();

            let path = plan.path.slice();
            let stepIndex = 0;

            if (stepTimer) {
                clearInterval(stepTimer);
                stepTimer = null;
            }

            const doStep = () => {
                if (state === 'GAME_OVER') {
                    clearInterval(stepTimer);
                    stepTimer = null;
                    isExecuting = false;
                    return;
                }

                // 跳过请求
                if (skipRequested) {
                    skipRequested = false;
                    
                    // 获取剩余路径
                    const remainingPath = path.slice(stepIndex);
                    
                    // 沿着剩余路径逐格移动（瞬间完成）
                    for (let i = 0; i < remainingPath.length; i++) {
                        const next = remainingPath[i];
                        const newHead = { x: next.x, y: next.y };
                        
                        // 检查是否吃到食物
                        let ate = false;
                        if (food.x >= 0 && food.y >= 0) {
                            if (newHead.x === food.x && newHead.y === food.y) {
                                ate = true;
                            }
                        }
                        
                        snake.unshift(newHead);
                        if (!ate) {
                            snake.pop();
                        } else {
                            generateFood();
                            if (food.x === -1 && food.y === -1) {
                                state = 'GAME_OVER';
                                // ...
                                return;
                            }
                        }
                        
                        // 检查蛇头是否被包围
                        if (isHeadTrapped()) {
                            state = 'GAME_OVER';
                            // ...
                            return;
                        }
                    }
                    
                    // 到达目标
                    state = 'IDLE';
                    isExecuting = false;
                    currentPath = [];
                    target = null;
                    isReachable = false;
                    lastClickedTarget = null;
                    clearInterval(stepTimer);
                    stepTimer = null;
                    updateUI();
                    draw();
                    return;
                }

                // 正常执行
                if (stepIndex >= path.length) {
                    state = 'IDLE';
                    isExecuting = false;
                    currentPath = [];
                    target = null;
                    isReachable = false;
                    lastClickedTarget = null;
                    clearInterval(stepTimer);
                    stepTimer = null;
                    updateUI();
                    draw();
                    if (window._pendingTarget) {
                        const pt = window._pendingTarget;
                        window._pendingTarget = null;
                        const newPlan = planPath(pt);
                        currentPath = newPlan.path;
                        isReachable = newPlan.reachable;
                        target = pt;
                        lastClickedTarget = pt;
                        if (newPlan.reachable) {
                            state = 'PLANNED';
                            updateUI();
                            draw();
                        } else {
                            state = 'IDLE';
                            updateUI();
                            draw();
                        }
                    }
                    return;
                }

                const next = path[stepIndex];
                if (next.x < 0 || next.x >= GRID || next.y < 0 || next.y >= GRID) {
                    state = 'IDLE';
                    isExecuting = false;
                    clearInterval(stepTimer);
                    stepTimer = null;
                    updateUI();
                    draw();
                    return;
                }

                const newHead = { x: next.x, y: next.y };
                let ate = false;
                if (food.x >= 0 && food.y >= 0) {
                    if (newHead.x === food.x && newHead.y === food.y) {
                        ate = true;
                    }
                }
                snake.unshift(newHead);
                if (!ate) {
                    snake.pop();
                } else {
                    generateFood();
                    if (food.x === -1 && food.y === -1) {
                        state = 'GAME_OVER';
                        isExecuting = false;
                        clearInterval(stepTimer);
                        stepTimer = null;
                        updateUI();
                        draw();
                        return;
                    }
                    const remainingPath = path.slice(stepIndex + 1);
                    console.assert(remainingPath.length === 0);
                }

                if (isHeadTrapped()) {
                    state = 'GAME_OVER';
                    isExecuting = false;
                    clearInterval(stepTimer);
                    stepTimer = null;
                    updateUI();
                    draw();
                    return;
                }

                stepIndex++;
                updateUI();
                draw();

                if (stepIndex >= path.length) {
                    state = 'IDLE';
                    isExecuting = false;
                    currentPath = [];
                    target = null;
                    isReachable = false;
                    lastClickedTarget = null;
                    clearInterval(stepTimer);
                    stepTimer = null;
                    updateUI();
                    draw();
                    if (window._pendingTarget) {
                        const pt = window._pendingTarget;
                        window._pendingTarget = null;
                        const newPlan = planPath(pt);
                        currentPath = newPlan.path;
                        isReachable = newPlan.reachable;
                        target = pt;
                        lastClickedTarget = pt;
                        if (newPlan.reachable) {
                            state = 'PLANNED';
                            updateUI();
                            draw();
                        } else {
                            state = 'IDLE';
                            updateUI();
                            draw();
                        }
                    }
                }
            };

            stepTimer = setInterval(doStep, stepInterval);
        }

        // ---------- 检查蛇头是否被包围 ----------
        function isHeadTrapped() {
            const head = snake[0];
            const snakeSet = new Set(snake.map((p, i) => {
                if (i === snake.length - 1) return null;
                return `${p.x},${p.y}`;
            }));
            snakeSet.delete(null);

            for (let d = 0; d < 4; d++) {
                const nx = head.x + DX[d],
                    ny = head.y + DY[d];
                if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) continue;
                if (!snakeSet.has(`${nx},${ny}`)) {
                    return false;
                }
            }
            return true;
        }

        // ---------- UI 更新 ----------
        function updateUI() {
            const statusMap = {
                'IDLE': '⏸ 空闲',
                'PLANNED': '🗺 已规划',
                'EXECUTING': '▶ 执行中',
                'GAME_OVER': '💀 游戏结束'
            };
            const clsMap = {
                'IDLE': 'idle',
                'PLANNED': 'planned',
                'EXECUTING': 'executing',
                'GAME_OVER': 'gameover'
            };
            statusBadge.textContent = statusMap[state] || '⏸ 空闲';
            statusBadge.className = 'status-badge ' + (clsMap[state] || 'idle');

            infoSnake.textContent = `🐍 ${snake.length}`;
            infoPath.textContent = `🛤 ${currentPath.length}`;
            if (target) {
                infoTarget.textContent = `🎯 (${target.x},${target.y})`;
            } else {
                infoTarget.textContent = '🎯 -';
            }
        }

        // ---------- 绘制 ----------
        function draw() {
            ctx.clearRect(0, 0, 600, 600);

            // 网格
            ctx.strokeStyle = '#2a2a4a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL, 0);
                ctx.lineTo(i * CELL, 600);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL);
                ctx.lineTo(600, i * CELL);
                ctx.stroke();
            }

            // 路径
            if (currentPath.length > 0 && state !== 'GAME_OVER') {
                const isReach = isReachable;
                const fillColor = isReach ? 'rgba(60, 160, 255, 0.25)' : 'rgba(255, 70, 70, 0.25)';
                const strokeColor = isReach ? 'rgba(60, 160, 255, 0.6)' : 'rgba(255, 70, 70, 0.6)';

                for (let i = 0; i < currentPath.length; i++) {
                    const p = currentPath[i];
                    const x = p.x * CELL,
                        y = p.y * CELL;
                    ctx.fillStyle = fillColor;
                    ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
                    ctx.strokeStyle = strokeColor;
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(x + 1, y + 1, CELL - 2, CELL - 2);

                    ctx.fillStyle = isReach ? '#8ac4ff' : '#ff8a7a';
                    ctx.font = `bold ${CELL * 0.32}px "Segoe UI", system-ui, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText((i + 1).toString(), x + HALF, y + HALF + 1);
                }

                if (!isReachable && currentPath.length > 0) {
                    const last = currentPath[currentPath.length - 1];
                    const lx = last.x * CELL + HALF;
                    const ly = last.y * CELL + HALF;
                    ctx.font = `bold ${CELL * 0.5}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = 'rgba(255, 50, 50, 0.9)';
                    ctx.fillText('❌', lx + CELL * 0.55, ly - CELL * 0.5);
                }
            }

            // 食物
            if (food.x >= 0 && food.y >= 0) {
                const fx = food.x * CELL + HALF,
                    fy = food.y * CELL + HALF;
                const grad = ctx.createRadialGradient(fx - 3, fy - 3, 2, fx, fy, CELL * 0.45);
                grad.addColorStop(0, '#ff6b6b');
                grad.addColorStop(0.7, '#ee2222');
                grad.addColorStop(1, '#991111');
                ctx.beginPath();
                ctx.arc(fx, fy, CELL * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.shadowColor = 'rgba(255, 60, 60, 0.5)';
                ctx.shadowBlur = 12;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(fx - 3, fy - 4, 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fill();
            }

            // 蛇身
            if (snake.length > 0) {
                const len = snake.length;
                for (let i = 0; i < len; i++) {
                    const p = snake[i];
                    const x = p.x * CELL,
                        y = p.y * CELL;
                    const t = len > 1 ? i / (len - 1) : 0;
                    const hue = 220 - t * 210;
                    const lightness = 55 + t * 15;
                    const color = `hsl(${hue}, 85%, ${lightness}%)`;
                    const radius = CELL * 0.28;

                    ctx.shadowColor = `hsla(${hue}, 80%, 50%, 0.3)`;
                    ctx.shadowBlur = 6;

                    const cx = x + HALF,
                        cy = y + HALF;
                    const r = radius;
                    const w = CELL - 2,
                        h = CELL - 2;
                    const rx = x + 1,
                        ry = y + 1;
                    ctx.beginPath();
                    ctx.moveTo(rx + r, ry);
                    ctx.lineTo(rx + w - r, ry);
                    ctx.quadraticCurveTo(rx + w, ry, rx + w, ry + r);
                    ctx.lineTo(rx + w, ry + h - r);
                    ctx.quadraticCurveTo(rx + w, ry + h, rx + w - r, ry + h);
                    ctx.lineTo(rx + r, ry + h);
                    ctx.quadraticCurveTo(rx, ry + h, rx, ry + h - r);
                    ctx.lineTo(rx, ry + r);
                    ctx.quadraticCurveTo(rx, ry, rx + r, ry);
                    ctx.closePath();
                    ctx.fillStyle = color;
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    if (i === 0) {
                        const eyeOff = CELL * 0.22;
                        const eyeR = CELL * 0.09;
                        let dx = 1,
                            dy = 0;
                        if (len > 1) {
                            dx = snake[0].x - snake[1].x;
                            dy = snake[0].y - snake[1].y;
                        }
                        if (dx === 0 && dy === 0) { dx = 1;
                            dy = 0; }
                        const angle = Math.atan2(dy, dx);
                        const ex1 = cx + Math.cos(angle + 0.6) * eyeOff;
                        const ey1 = cy + Math.sin(angle + 0.6) * eyeOff;
                        const ex2 = cx + Math.cos(angle - 0.6) * eyeOff;
                        const ey2 = cy + Math.sin(angle - 0.6) * eyeOff;
                        ctx.fillStyle = '#f0f0ff';
                        ctx.beginPath();
                        ctx.arc(ex1, ey1, eyeR, 0, 2 * Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(ex2, ey2, eyeR, 0, 2 * Math.PI);
                        ctx.fill();
                        ctx.fillStyle = '#1a1a2e';
                        const pupR = eyeR * 0.5;
                        ctx.beginPath();
                        ctx.arc(ex1 + Math.cos(angle) * pupR * 0.6, ey1 + Math.sin(angle) * pupR * 0.6, pupR, 0, 2 * Math
                        .PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(ex2 + Math.cos(angle) * pupR * 0.6, ey2 + Math.sin(angle) * pupR * 0.6, pupR, 0, 2 * Math
                        .PI);
                        ctx.fill();
                    }
                }

                if (snake.length > 1) {
                    ctx.lineWidth = CELL * 0.35;
                    ctx.lineCap = 'round';
                    for (let i = 0; i < snake.length - 1; i++) {
                        const p1 = snake[i];
                        const p2 = snake[i + 1];
                        const t = snake.length > 1 ? i / (snake.length - 1) : 0;
                        const hue = 220 - t * 210;
                        ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.6)`;
                        ctx.beginPath();
                        ctx.moveTo(p1.x * CELL + HALF, p1.y * CELL + HALF);
                        ctx.lineTo(p2.x * CELL + HALF, p2.y * CELL + HALF);
                        ctx.stroke();
                    }
                }
            }

            if (state === 'GAME_OVER') {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, 600, 600);
                ctx.fillStyle = '#ff6a6a';
                ctx.font = 'bold 48px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(255,0,0,0.5)';
                ctx.shadowBlur = 30;
                ctx.fillText('💀 GAME OVER', 300, 280);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ccaacc';
                ctx.font = '20px sans-serif';
                ctx.fillText('点击"新游戏"重新开始', 300, 350);
            }

            if (food.x === -1 && food.y === -1 && state !== 'GAME_OVER') {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, 600, 600);
                ctx.fillStyle = '#6aff6a';
                ctx.font = 'bold 48px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,255,0,0.5)';
                ctx.shadowBlur = 30;
                ctx.fillText('🎉 你赢了！', 300, 280);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ccaacc';
                ctx.font = '20px sans-serif';
                ctx.fillText('点击"新游戏"再来一局', 300, 350);
            }

            if (state === 'PLANNED' && currentPath.length > 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(10, 560, 160, 28);
                ctx.fillStyle = '#7abfff';
                ctx.font = '13px sans-serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                const label = isReachable ? '✅ 点击同一格执行' : '❌ 不可达';
                ctx.fillText(label, 18, 574);
            }
        }

        // ---------- 点击处理 ----------
        function handleCanvasClick(e) {
            if (state === 'GAME_OVER') return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;
            const gx = Math.floor(mx / CELL);
            const gy = Math.floor(my / CELL);
            if (gx < 0 || gx >= GRID || gy < 0 || gy >= GRID) return;

            // 执行中 → 跳过动画
            if (state === 'EXECUTING') {
                skipRequested = true;
                window._pendingTarget = { x: gx, y: gy };
                return;
            }

            const targetPos = { x: gx, y: gy };

            // 判断是否与上次点击同一格 (用于决定是否执行)
            const isSameTarget = lastClickedTarget &&
                lastClickedTarget.x === targetPos.x &&
                lastClickedTarget.y === targetPos.y;

            // 规划
            const plan = planPath(targetPos);
            currentPath = plan.path;
            isReachable = plan.reachable;
            target = targetPos;

            if (state === 'IDLE') {
                // 第一次点击 (或从空闲状态) → 显示路径, 进入 PLANNED
                lastClickedTarget = targetPos;
                if (plan.reachable) {
                    state = 'PLANNED';
                } else {
                    state = 'IDLE';
                }
                updateUI();
                draw();
            } else if (state === 'PLANNED') {
                if (isSameTarget && plan.reachable && plan.path.length > 0) {
                    // 同一格 → 执行
                    startExecution(plan);
                } else {
                    // 不同格 → 重新规划，停留在 PLANNED (不执行)
                    lastClickedTarget = targetPos;
                    if (plan.reachable) {
                        state = 'PLANNED';
                    } else {
                        state = 'IDLE';
                    }
                    updateUI();
                    draw();
                }
            }
        }

        // ---------- 重新开始 ----------
        function restartGame() {
            if (stepTimer) {
                clearInterval(stepTimer);
                stepTimer = null;
            }
            isExecuting = false;
            skipRequested = false;
            window._pendingTarget = null;
            lastClickedTarget = null;
            initGame();
        }

        // ---------- 速度控制 ----------
        speedSlider.addEventListener('input', function() {
            stepInterval = Math.round(Math.pow(10, parseFloat(this.value)));
            speedLabel.textContent = stepInterval + 'ms';
            if (stepTimer) {
                clearInterval(stepTimer);
                stepTimer = null;
                if (state === 'EXECUTING' && isExecuting && currentPath.length > 0) {
                    const plan = {
                        path: currentPath.slice(),
                        reachable: isReachable,
                        target: target,
                        isFoodTarget: (food.x === target?.x && food.y === target?.y)
                    };
                    startExecution(plan);
                }
            }
        });
        speedSlider.dispatchEvent(new Event('input'));

        // ---------- 事件绑定 ----------
        canvas.addEventListener('click', handleCanvasClick);
        restartBtn.addEventListener('click', restartGame);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                restartGame();
            }
        });

        // ---------- 启动 ----------
        initGame();

        //
        console.log("这是一个由小唐丸模型生成的贪吃蛇游戏，除了能跑，剩下的只有屎。")
        console.log("我才不会给它擦屁股呢，智障东西 o((>ω< ))o")
        console.log("咒这个大傻逼模型永远找不到对象 (* ￣︿￣) ")
        console.log("（热知识：这里它确实没有对象，也没有码）")
    </script>
</body>
